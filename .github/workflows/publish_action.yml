name: Publish to Comfy registry
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  publish-node:
    name: Publish Custom Node to registry
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      # TST-8 release gate: a red suite must NOT ship to the registry.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest pytest-cov
      # TST-7 (coverage half): report coverage and fail on a catastrophic drop.
      # The floor is conservative because CI is CPU-only — the CUDA-graph /
      # torch_compile tier branches don't execute here (they lower local coverage
      # to ~82%; the .coveragerc fail_under=82 gates CUDA-capable local runs).
      - name: Run tests (publish gate) + coverage
        # The tests import the package as `TEX_Wrangle`, but the GitHub repo is named
        # `TEX`, so the default checkout dir is `TEX` -> `import TEX_Wrangle` fails. Run the
        # gate against a `TEX_Wrangle`-named copy (leaving the root checkout untouched so the
        # publish step below still finds pyproject.toml at the workspace root).
        run: |
          mkdir -p /tmp/texpkg
          cp -r "$GITHUB_WORKSPACE/." /tmp/texpkg/TEX_Wrangle
          cd /tmp/texpkg/TEX_Wrangle
          python -m pytest tests/ -v -m 'not slow' \
            --cov=TEX_Wrangle --cov-report=term-missing --cov-fail-under=70
      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }} ## Add your own personal access token to your Github Repository secrets and reference it here.
