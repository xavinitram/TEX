name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          path: TEX_Wrangle

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: TEX_Wrangle/pyproject.toml

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest pytest-cov

      - name: Run tests (with coverage — A1-3, gates per-PR not just at publish)
        working-directory: TEX_Wrangle
        # --cov-config reads .coveragerc (source=TEX_Wrangle, omit .tex_cache, fail_under=82).
        # The gate now fires on every PR; previously coverage ran only in publish_action.yml.
        run: python -m pytest tests/ -v -m 'not slow' --cov=TEX_Wrangle --cov-config=.coveragerc --cov-report=term-missing
