version = "0.7.0"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "xavinitram" }]
keywords = ["comfyui", "image-processing", "shader", "vex", "blinkscript", "pixel", "mask", "latent", "batch", "noise", "custom-node", "expression", "scripting", "wrangle"]
