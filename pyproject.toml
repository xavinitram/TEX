[tool.comfy]
PublisherId = "xavinitram"
DisplayName = "TEX Wrangle"
Icon = "https://raw.githubusercontent.com/xavinitram/TEX/main/assets/TEX_Logo.jpg"
Banner = "https://raw.githubusercontent.com/xavinitram/TEX/main/assets/TEX_Banner.jpg"
